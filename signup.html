<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Create Account</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300f0ff'/%3E%3Cstop offset='100%25' stop-color='%238a2be2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M50 5 L95 25 L95 75 L50 95 L5 75 L5 25 Z' fill='url(%23g)'/%3E%3Cpath d='M50 20 L80 35 L80 65 L50 80 L20 65 L20 35 Z' fill='%230f172a'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%2300f0ff'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <style>
        /* Strict Rules: Centered form, no scrolling, no nav, no footer */
        html {
            overflow-x: hidden;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, rgba(138, 43, 226, 0.15), transparent 40%),
                radial-gradient(circle at bottom right, rgba(0, 240, 255, 0.1), transparent 40%),
                var(--bg-dark);
            overflow-x: hidden;
            /* Prevent decorative shapes from causing scroll */
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: var(--bg-surface-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
        }

        .auth-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 1000;
        }

        .auth-control-btn {
            background: var(--bg-surface-elevated);
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            font-family: inherit;
        }

        .auth-control-btn:hover {
            background: var(--bg-surface);
            border-color: var(--primary-blue);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .auth-control-btn i {
            font-size: 1.1rem;
        }

        .auth-control-btn.rtl-active {
            border-color: var(--primary-blue);
            color: var(--primary-blue);
        }

        .auth-brand {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .auth-brand .brand {
            font-size: 2rem;
        }

        .auth-title {
            text-align: center;
            margin-bottom: 25px;
        }

        .auth-title h2 {
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        .auth-title p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .auth-separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .auth-separator::before,
        .auth-separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-subtle);
        }

        .auth-separator:not(:empty)::before {
            margin-right: 15px;
        }

        .auth-separator:not(:empty)::after {
            margin-left: 15px;
        }

        .social-login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            border-radius: 8px;
        }

        .social-login-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary-blue);
            font-weight: 600;
            text-decoration: none;
        }

        /* Abstract Background Elements */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            opacity: 0.3;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: var(--secondary-purple);
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: var(--primary-blue);
            bottom: -50px;
            right: -100px;
        }

        /* Checkbox styling */
        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 20px 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .terms-checkbox a {
            color: var(--primary-blue);
            text-decoration: none;
        }

        .terms-checkbox a:hover {
            text-decoration: underline;
        }

        .terms-checkbox input[type="checkbox"] {
            margin-top: 3px;
            accent-color: var(--primary-blue);
        }

        @media (max-height: 750px) {
            body {
                overflow-y: auto;
                padding: 20px;
            }
            .auth-container {
                margin: 20px 0;
            }
        }

        @media (max-width: 768px) {
            html, body {
                overflow-x: hidden !important;
                width: 100vw;
            }

            .bg-shape {
                display: none !important;
            }

            .auth-container {
                padding: 40px 20px;
                border: 1px solid var(--border-subtle);
                border-radius: 20px;
                max-width: calc(100% - 30px) !important;
                margin: 0 auto !important;
                position: relative !important;
                box-sizing: border-box !important;
            }

            .auth-brand .brand {
                font-size: 1.5rem;
            }

            .auth-title h2 {
                font-size: 1.3rem;
            }

            .auth-title p {
                font-size: 0.85rem;
            }

            .form-control {
                padding: 12px 18px;
                font-size: 0.95rem;
            }

            .btn-full {
                padding: 12px !important;
                font-size: 0.95rem !important;
            }

            .auth-controls {
                position: absolute !important;
                top: 15px !important;
                right: 15px !important;
                gap: 8px;
            }

            .auth-control-btn {
                width: 38px;
                height: 38px;
                border-radius: 10px;
            }

            .grid.grid-2 {
                grid-template-columns: 1fr;
                gap: 15px !important;
            }

            .terms-checkbox {
                font-size: 0.8rem;
            }
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle');
            const rtlBtn = document.getElementById('rtl-btn');
            
            // Theme Toggle Logic
            themeToggle.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            });

            // RTL Toggle Logic
            const updateRTL = (isRTL) => {
                document.documentElement.setAttribute('dir', isRTL ? 'rtl' : 'ltr');
                if (isRTL) {
                    rtlBtn.classList.add('rtl-active');
                } else {
                    rtlBtn.classList.remove('rtl-active');
                }

                const rtlLabel = rtlBtn.querySelector('#rtl-label') || rtlBtn.querySelector('span');
                if (rtlLabel) {
                    rtlLabel.textContent = isRTL ? 'RTL' : 'LTR';
                }

                localStorage.setItem('rtl', isRTL ? 'true' : 'false');
            };

            const savedRTL = localStorage.getItem('rtl') === 'true';
            updateRTL(savedRTL);

            rtlBtn.addEventListener('click', () => {
                const isRTL = document.documentElement.getAttribute('dir') === 'rtl';
                updateRTL(!isRTL);
            });
        });
    </script>
</head>

<body>
    <div class="auth-container">
        <div class="auth-controls">
            <button id="rtl-btn" class="auth-control-btn" title="Toggle RTL/LTR Mode">
                <span id="rtl-label" style="font-weight: 700;">LTR</span>
            </button>
            <button id="theme-toggle" class="auth-control-btn" title="Toggle Dark/Light Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
        <!-- Clickable Logo -->
        <div class="auth-brand">
            <a href="index.html" class="brand"
                style="justify-content: center; display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 5 L95 25 L95 75 L50 95 L5 75 L5 25 Z" fill="url(#grad1)" />
                    <path d="M50 20 L80 35 L80 65 L50 80 L20 65 L20 35 Z" fill="var(--bg-dark)" />
                    <circle cx="50" cy="50" r="15" fill="var(--primary-blue)" />
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="var(--primary-blue)" />
                            <stop offset="100%" stop-color="var(--secondary-purple)" />
                        </linearGradient>
                    </defs>
                </svg>
                <span>AURA</span>
            </a>
        </div>

        <div class="auth-title">
            <h2>Create an Account</h2>
            <p>Join us to get exclusive offers and track orders.</p>
        </div>

        <form action="user-dashboard.html">
            <div class="grid grid-2" style="gap: 15px;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label>First Name</label>
                    <input type="text" class="form-control" placeholder="John" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Last Name</label>
                    <input type="text" class="form-control" placeholder="Doe" required>
                </div>
            </div>

            <div class="form-group" style="margin-top: 15px; margin-bottom: 0;">
                <label>Email Address</label>
                <div style="position: relative;">
                    <i class="fa-regular fa-envelope"
                        style="position: absolute; left: 15px; top: 15px; color: var(--text-muted);"></i>
                    <input type="email" class="form-control" placeholder="john@example.com" required
                        style="padding-left: 45px;">
                </div>
            </div>

            <div class="form-group" style="margin-top: 15px; margin-bottom: 0;">
                <label>Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock"
                        style="position: absolute; left: 15px; top: 15px; color: var(--text-muted);"></i>
                    <input type="password" class="form-control" placeholder="Create a strong password" required
                        style="padding-left: 45px;">
                </div>
            </div>

            <label class="terms-checkbox">
                <input type="checkbox" required>
                <span class="text-muted">I agree to the <a href="#" style="color: var(--primary-blue);">AURA
                        Terms of Service</a> and <a href="#" style="color: var(--primary-blue);">Privacy
                        Policy</a></span>
            </label>

            <button type="submit" class="btn btn-primary btn-full" style="padding: 14px; font-size: 1.05rem;">
                Create Account <i class="fa-solid fa-user-plus"></i>
            </button>
        </form>

        <div class="auth-separator">OR SIGN UP WITH</div>

        <div class="grid grid-2" style="gap: 15px;">
            <button class="social-login-btn btn-google">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path>
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path>
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path>
                    <path fill="#1976D2" d="M43.611,20.083L43.611,20.083L42,20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path>
                </svg>
                Google
            </button>
            <button class="social-login-btn btn-apple">
                <i class="fa-brands fa-apple" style="font-size: 1.2rem;"></i> Apple
            </button>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign in here</a>
        </div>
    </div>
</body>
</html>
